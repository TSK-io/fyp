<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藏红花云端大数据中心</title>
    <style>
        /* 切换为浅色主题的配色变量 */
        :root { 
            --bg: #f8fafc; 
            --card: #ffffff; 
            --text: #0f172a; 
            --accent: #0284c7; /* 加深了一点蓝色以提高浅色背景下的对比度 */
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .header { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 700; color: var(--accent); }
        .header p { margin: 8px 0 0; font-size: 14px; color: #64748b; } /* 调整为适合浅色背景的灰色 */
        
        .badge { 
            display: inline-block; 
            background: rgba(2, 132, 199, 0.1); 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: bold; 
            margin-bottom: 16px; 
            box-shadow: 0 0 10px rgba(2, 132, 199, 0.15); 
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 500px; }
        .card { 
            background: var(--card); 
            border-radius: 16px; 
            padding: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); /* 调整为更柔和的浅色模式阴影 */
            text-align: center; 
            border: 1px solid #e2e8f0; /* 边框变浅 */
            transition: transform 0.2s; 
        }
        .card:active { transform: scale(0.95); }
        .icon { font-size: 28px; margin-bottom: 8px; }
        .value { font-size: 32px; font-weight: 700; margin: 4px 0; }
        .label { font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }

        .footer { margin-top: 40px; font-size: 12px; color: #475569; text-align: center; }
        .pulse { display: inline-block; width: 8px; height: 8px; background-color: #10b981; border-radius: 50%; margin-right: 6px; box-shadow: 0 0 8px #10b981; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="badge">☁️  DigitalOcean 汇聚节点</div>
        <h1>藏红花云端大数据中心</h1>
        <p>实时多地数据同步</p>
    </div>

    <div class="grid">
        <div class="card">
            <div class="icon">🌡️</div>
            <div class="value" id="temp">--</div>
            <div class="label">空气温度 (°C)</div>
        </div>
        <div class="card">
            <div class="icon">💧</div>
            <div class="value" id="humi">--</div>
            <div class="label">空气湿度 (%)</div>
        </div>
        <div class="card">
            <div class="icon">☀️</div>
            <div class="value" id="lux">--</div>
            <div class="label">光照强度 (Lux)</div>
        </div>
        <div class="card">
            <div class="icon">🌱</div>
            <div class="value" id="soil">--</div>
            <div class="label">土壤含水率 (%)</div>
        </div>
    </div>

    <div class="footer">
        <div><span class="pulse"></span>边缘设备连接正常 | 正在监听 MQTT</div>
        <div style="margin-top: 8px;">最后同步: <span id="timestamp">--</span></div>
    </div>

    <script>
        async function fetchCloudData() {
            try {
                const res = await fetch('/api/latest');
                const data = await res.json();
                if (!data.error) {
                    document.getElementById('temp').innerText = data.temperature ?? '--';
                    document.getElementById('humi').innerText = data.humidity ?? '--';
                    document.getElementById('lux').innerText = data.lux ? data.lux.toFixed(1) : '--';
                    document.getElementById('soil').innerText = data.soil ?? '--';
                    document.getElementById('timestamp').innerText = data.timestamp ?? '--';
                }
            } catch (err) {
                console.error("网络请求失败", err);
            }
        }
        fetchCloudData();
        setInterval(fetchCloudData, 2000); // 每2秒静默刷新一次
    </script>
</body>
</html>
