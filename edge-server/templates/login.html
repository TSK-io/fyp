{% extends "base.html" %}

{% block title %}登录 - 藏红花智能培育系统{% endblock %}

{% block body_class %}login-page{% endblock %}

{% block head_assets %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block body %}
  <div class="app-page login-page">
    <div class="panel login-card">
      <div class="login-card__header">
        <h1 class="login-card__title">登录</h1>
      </div>
      <div class="login-form">
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" type="text" placeholder="首个注册用户将成为管理员">
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" type="password" placeholder="不少于 6 位建议">
        </div>
        <div class="login-actions">
          <button id="btn-login" class="button button--primary">登录</button>
          <button id="btn-register" class="button button--ghost">注册并登录</button>
        </div>
        <div id="msg" class="status-text"></div>
      </div>
      <div class="login-links">
        <a href="/">返回实时监控</a>
      </div>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
