{% extends "base.html" %}

{% block title %}历史趋势 - 藏红花培育系统{% endblock %}

{% block head_assets %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/history.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
{% endblock %}

{% block body %}
  <div class="app-page">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1 class="topbar__title">环境时序数据追溯</h1>
        </div>
        <nav class="topbar__links">
          <a href="/">实时界面</a>
          <a href="/admin">后台管理</a>
          <a href="/login">账号登录</a>
        </nav>
      </header>

      <section class="page-section panel history-filters">
        {# 筛选器同时控制图表查询和 CSV 导出，保证两者口径一致。 #}
        <div class="field">
          <label for="start">开始时间</label>
          <input id="start" type="datetime-local">
        </div>
        <div class="field">
          <label for="end">结束时间</label>
          <input id="end" type="datetime-local">
        </div>
        <div class="field">
          <label for="limit">拉取条数</label>
          <input id="limit" type="number" min="10" max="1000" step="10" value="200">
        </div>
        <div class="history-actions">
          <button id="load" class="button button--primary">立即查询</button>
          <button id="export" class="button button--secondary">导出 CSV</button>
        </div>
        <div id="status" class="status-text history-status">系统就绪</div>
      </section>

      <section class="page-section chart-grid">
        <article class="panel chart-panel">
          <h2 class="section-heading">温湿度交变趋势</h2>
          <div id="chart-th" class="chart-panel__canvas"></div>
        </article>
        <article class="panel chart-panel">
          <h2 class="section-heading">光照与土壤水分趋势</h2>
          {# 土壤图会叠加水泵运行区间，方便观察补水后的回升效果。 #}
          <div id="chart-ls" class="chart-panel__canvas"></div>
        </article>
      </section>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/history.js') }}"></script>
{% endblock %}
