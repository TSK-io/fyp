{% extends "base.html" %}

{% block title %}后台管理 - 藏红花培育系统{% endblock %}

{% block head_assets %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}

{% block body %}
  <div class="app-page">
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1 class="topbar__title">核心参数与系统审计</h1>
        </div>
        <nav class="topbar__links">
          <a href="/">实时控制</a>
          <a href="/history">历史图表</a>
          <a href="/login">账号登录</a>
        </nav>
      </header>

      <div id="auth-info" class="panel auth-banner pill-status">鉴权状态检测中...</div>

      <section class="page-section admin-layout">
        <article class="panel admin-card">
          <h2 class="section-heading">边缘自动化策略</h2>
          <div class="admin-form">
            <label class="admin-form__toggle" for="en">
              <input type="checkbox" id="en">
              <span>启用边缘自动灌溉</span>
            </label>
            <div class="field">
              <label for="th">触发阈值 (%)，基于土壤湿度</label>
              <input id="th" type="number" min="0" max="100" step="0.1">
            </div>
            <div class="field">
              <label for="sec">单次浇水时长 (秒)</label>
              <input id="sec" type="number" min="1" max="3600" step="1">
            </div>
            <div class="field">
              <label for="cd">最小冷却间隔 (秒)</label>
              <input id="cd" type="number" min="0" max="86400" step="1">
            </div>
            <div class="field">
              <label for="tok">Admin Token（可选）</label>
              <input id="tok" type="password" placeholder="若未登录，可凭口令覆写">
            </div>
            <button id="save" class="button button--primary">保存到边缘节点</button>
            <div id="msg" class="status-text"></div>
          </div>
        </article>

        <article class="panel admin-card">
          <div class="admin-toolbar">
            <div class="admin-toolbar__heading">
              <h2 class="section-heading">终端设备审计日志</h2>
            </div>
            <div class="admin-toolbar__actions">
              <input id="limit" type="number" min="10" max="500" step="10" value="100">
              <button id="reload" class="button button--ghost">刷新列表</button>
            </div>
          </div>

          <div class="log-shell">
            <table class="log-table">
              <thead>
                <tr>
                  <th>下发时间</th>
                  <th>目标执行器</th>
                  <th>动作载荷</th>
                  <th>硬件反馈</th>
                </tr>
              </thead>
              <tbody id="logs"></tbody>
            </table>
          </div>
          <div id="status" class="status-text admin-status">日志拉取中...</div>
        </article>
      </section>
    </div>
  </div>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
